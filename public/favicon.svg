<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer thin ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#4f46e5" stroke-width="2" opacity="0.8" />

  <!-- Inner filled circle with glow -->
  <circle cx="50" cy="50" r="38" fill="#6366f1" filter="url(#glow)" />

  <!-- Text CM -->
  <text x="50" y="53" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">CM</text>
</svg>
